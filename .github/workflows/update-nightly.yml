name: Update to Latest Nightly

on:
  schedule:
    # Run daily at 6 AM UTC (after nextnet deploys at 5 AM)
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      version:
        description: 'Nightly version (e.g., 4.0.0-nightly.20260206)'
        required: false
        type: string
      rollup_version:
        description: 'Rollup version for nextnet (e.g., 3863723750)'
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  update-nightly:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/next'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: next

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Enable Corepack
        run: corepack enable

      - name: Run update script
        env:
          CI: 1
        run: |
          ARGS=""

          if [ -n "${{ inputs.version }}" ]; then
            ARGS="$ARGS --version ${{ inputs.version }}"
          fi

          if [ -n "${{ inputs.rollup_version }}" ]; then
            ARGS="$ARGS --rollup-version ${{ inputs.rollup_version }}"
          fi

          node scripts/update-to-nightly.js $ARGS

      - name: Get updated version
        id: version
        run: |
          VERSION=$(node -e "const p = JSON.parse(require('fs').readFileSync('app/package.json','utf-8')); console.log(p.dependencies['@aztec/wallet-sdk'])")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "chore: update to ${{ steps.version.outputs.version }}"
          title: "chore: update to ${{ steps.version.outputs.version }}"
          body: |
            Automated update to Aztec nightly version ${{ steps.version.outputs.version }}

            **Changes:**
            - Updated all @aztec/* dependencies in app/package.json
            - Updated @aztec/wallet-sdk in extension/package.json
            - Updated nextnet rollup version (auto-fetched from nextnet node)

            **Note:** This PR was created automatically by the update-nightly workflow.
          branch: automated-nightly-update-${{ steps.version.outputs.version }}
          delete-branch: true
          base: next
